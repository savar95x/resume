name: Auto-Compile Resume

on:
  push:
    branches: [ main ]

jobs:
  build_pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install TeX Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended

      - name: Build PDFs using Makefile
        run: make

      - name: Upload PDFs to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Savar_Resumes
          path: |
            Savar_Resume_Campus.pdf
            Savar_Resume_OffCampus.pdf

      - name: Checkout Website Repository
        uses: actions/checkout@v4
        with:
          repository: savar95x/savar95x.github.io
          token: ${{ secrets.WEBSITE_SYNC_TOKEN }}
          path: website-repo

      - name: Push PDF to Website
        run: |
          # Ensure the static directory exists (Git ignores empty directories)
          mkdir -p website-repo/static
          
          # Copy the off-campus resume into the Hugo static folder
          cp Savar_Resume_OffCampus.pdf website-repo/static/resume.pdf
          
          cd website-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add static/resume.pdf
          git commit -m "chore: auto-sync latest resume PDF" || echo "No changes to commit"
          git push
